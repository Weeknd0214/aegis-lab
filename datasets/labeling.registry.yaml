version: 1
# 标注引擎：统一 CVAT（开标时按 scope 自动生成 labels）
profiles:
  ddaw:
    scope_key: "dms:ddaw"
    export_default: yolo
    ml_adapter: dms_yolo
  addw:
    scope_key: "dms:addw"
    export_default: yolo
    ml_adapter: dms_yolo
  addw_face:
    scope_key: "dms:addw_face"
    export_default: yolo_pose
    ml_adapter: dms_yolo_pose
  dam__batch_0516:
    scope_key: "dms:dam:batch_0516"
    export_default: yolo
    ml_adapter: dms_yolo
  dam__batch_0417:
    scope_key: "dms:dam:batch_0417"
    export_default: yolo
    ml_adapter: dms_yolo
  forward__detect:
    scope_key: "dms:forward:detect"
    export_default: yolo
    ml_adapter: dms_yolo
  forward__classify:
    scope_key: "dms:forward:classify"
    export_default: folder_cls
    ml_adapter: dms_yolo_cls
  lane__lane_v1:
    scope_key: "lane:lane_v1"
    export_default: lane_gt_txt
    ml_adapter: lane_ufld
  det_7cls:
    scope_key: "adas:det_7cls"
    export_default: yolo
    ml_adapter: adas_yolo26
    cvat_label_type: rectangle
    cvat_labels:
      - pedestrian
      - car
      - truck
      - bus
      - motorcycle
      - tricycle
      - traffic cone
  cuboid_7cls:
    scope_key: "adas:cuboid_7cls"
    export_default: cvat_cuboid
    ml_adapter: adas_yolo26
    cvat_label_type: cuboid
  adas:
    scope_key: "dms:adas"
    export_default: yolo
    ml_adapter: adas_yolo26
    cvat_label_type: rectangle
