# aegis-lab — 平台 + CVAT 标注引擎（单文件 compose）
# 用法:
#   docker compose up -d --build          # 本地构建
#   docker compose pull && docker compose up -d   # 使用 GHCR 预构建镜像
#
# 镜像: ghcr.io/weeknd0214/aegis-lab-platform / aegis-lab-cvat-server
# 推送: bash scripts/docker_push.sh

name: aegis-lab

x-platform-env: &platform-env
  AS_DB_HOST: postgres
  AS_DB_PORT: "5432"
  AS_DB_USER: as_platform
  AS_DB_PASSWORD: as_platform
  AS_DB_NAME: as_platform
  AS_REDIS_URL: redis://redis:6379/0
  AS_JOB_EXECUTOR: worker
  AS_DEV_AUTH: "true"
  AS_FORCE_DEV_AUTH: "true"
  AS_JWT_SECRET: dev-docker-secret
  AS_FRONTEND_URL: http://127.0.0.1:8788
  FEISHU_REDIRECT_URI: http://127.0.0.1:8788/api/v1/auth/feishu/callback
  AS_WORKSPACE_ROOT: /data/workspace
  AS_DATA_LAKE_ROOT: /data/data
  CVAT_HOST: ${CVAT_HOST:-http://aegis-lab-cvat-server:8080}
  CVAT_PUBLIC_URL: ${CVAT_PUBLIC_URL:-http://127.0.0.1:8081}

x-platform-volumes: &platform-volumes
  - .:/data/hsap
  - ${AS_WORKSPACE_ROOT:-./.workspace-stub}:/data/workspace:ro
  - ${AS_DATA_LAKE_HOST:-../data}:/data/data

x-cvat-server-image: &cvat-server-image
  image: ${AEGIS_CVAT_IMAGE:-ghcr.io/weeknd0214/aegis-lab-cvat-server:${AEGIS_IMAGE_TAG:-latest}}
  build:
    context: .
    dockerfile: docker/cvat-server/Dockerfile

x-cvat-server-volumes: &cvat-server-volumes
  - cvat_data:/home/django/data
  - cvat_keys:/home/django/keys
  - cvat_logs:/home/django/logs
  - ${AS_WORKSPACE_ROOT:-./.workspace-stub}:/home/django/share/workspace:ro

x-cvat-backend-env: &cvat-backend-env
  CVAT_POSTGRES_HOST: cvat_db
  CVAT_REDIS_INMEM_HOST: cvat_redis_inmem
  CVAT_REDIS_INMEM_PORT: 6379
  CVAT_REDIS_ONDISK_HOST: cvat_redis_ondisk
  CVAT_REDIS_ONDISK_PORT: 6666
  CLICKHOUSE_HOST: cvat_clickhouse
  CLICKHOUSE_PORT: 8123
  CLICKHOUSE_DB: cvat
  CLICKHOUSE_USER: user
  CLICKHOUSE_PASSWORD: user
  IAM_OPA_URL: http://cvat_opa:8181
  CVAT_OPA_URL: http://cvat_opa:8181
  CVAT_ANALYTICS: "0"
  CVAT_ALLOW_STATIC_CACHE: "no"
  ALLOWED_HOSTS: "*"
  SMOKESCREEN_OPTS: ""
  no_proxy: clickhouse,grafana,vector,opa

services:
  # ── Platform stack ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aegis-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: as_platform
      POSTGRES_PASSWORD: as_platform
      POSTGRES_DB: as_platform
    ports:
      - "${AS_DB_PORT:-5433}:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U as_platform -d as_platform"]
      interval: 5s
      timeout: 5s
      retries: 8
    networks:
      default:
        aliases:
          - postgres

  redis:
    image: redis:7-alpine
    container_name: aegis-lab-redis
    restart: unless-stopped
    ports:
      - "${AS_REDIS_PORT:-6380}:6379"
    volumes:
      - aegis_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8
    networks:
      default:
        aliases:
          - redis

  platform:
    image: ${AEGIS_PLATFORM_IMAGE:-ghcr.io/weeknd0214/aegis-lab-platform:${AEGIS_IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-lab-platform
    restart: unless-stopped
    env_file:
      - manifests/feishu.env
    ports:
      - "${AS_PLATFORM_PORT:-8788}:8787"
    environment:
      <<: *platform-env
    volumes: *platform-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cvat_traefik:
        condition: service_started

  worker:
    image: ${AEGIS_PLATFORM_IMAGE:-ghcr.io/weeknd0214/aegis-lab-platform:${AEGIS_IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-lab-worker
    restart: unless-stopped
    env_file:
      - manifests/feishu.env
    environment:
      <<: *platform-env
    volumes: *platform-volumes
    command: ["python", "scripts/worker.py"]
    depends_on:
      platform:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: aegis-lab-minio
    profiles: ["minio"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - aegis_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: aegis-lab-minio-init
    profiles: ["minio"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-aegis-staging}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$MINIO_BUCKET || true &&
      mc anonymous set download local/$$MINIO_BUCKET || true
      "
    restart: "no"

  # ── CVAT stack（补丁在 vendor/cvat/patches/，已打入 aegis-lab-cvat-server 镜像）──
  cvat_db:
    image: postgres:15-alpine
    container_name: aegis-lab-cvat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: cvat
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - cvat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d cvat"]
      interval: 5s
      timeout: 5s
      retries: 8

  cvat_redis_inmem:
    image: redis:7.2.11-alpine
    container_name: aegis-lab-cvat-redis-inmem
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "100", "--appendonly", "yes"]
    volumes:
      - cvat_inmem_db:/data

  cvat_redis_ondisk:
    image: apache/kvrocks:2.15.0
    container_name: aegis-lab-cvat-redis-ondisk
    restart: unless-stopped
    init: true
    volumes:
      - cvat_cache_db:/var/lib/kvrocks
    command: ["--compact-cron", "0 3 * * *"]

  cvat_clickhouse:
    image: clickhouse/clickhouse-server:23.11-alpine
    container_name: aegis-lab-cvat-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: cvat
      CLICKHOUSE_USER: user
      CLICKHOUSE_PASSWORD: user
    volumes:
      - cvat_clickhouse:/var/lib/clickhouse
      - cvat_clickhouse_logs:/var/log/clickhouse-server
    networks:
      default:
        aliases:
          - clickhouse

  cvat_server:
    <<: *cvat-server-image
    container_name: aegis-lab-cvat-server
    restart: unless-stopped
    command: init run server nginx
    environment:
      <<: *cvat-backend-env
    labels:
      - traefik.enable=true
      - traefik.http.services.cvat.loadbalancer.server.port=8080
      - traefik.http.routers.cvat.rule=Host(`localhost`)||Host(`127.0.0.1`)&&(PathPrefix(`/api/`)||PathPrefix(`/static/`)||PathPrefix(`/admin`))
      - traefik.http.routers.cvat.entrypoints=web
    volumes: *cvat-server-volumes
    depends_on:
      cvat_db:
        condition: service_healthy
      cvat_clickhouse:
        condition: service_started
    networks:
      default:
        aliases:
          - cvat-server

  cvat_opa:
    image: openpolicyagent/opa:1.12.2
    container_name: aegis-lab-cvat-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=:8181
      - --log-level=error
      - --set=services.cvat.url=http://cvat-server:8080
      - --set=bundles.cvat.service=cvat
      - --set=bundles.cvat.resource=/api/auth/rules
      - --set=bundles.cvat.polling.min_delay_seconds=5
      - --set=bundles.cvat.polling.max_delay_seconds=15
    networks:
      default:
        aliases:
          - opa
    depends_on:
      - cvat_server

  cvat_worker_import:
    <<: *cvat-server-image
    container_name: aegis-lab-cvat-worker-import
    restart: unless-stopped
    environment:
      <<: *cvat-backend-env
    volumes: *cvat-server-volumes
    command: run worker import
    depends_on:
      - cvat_server

  cvat_worker_export:
    <<: *cvat-server-image
    container_name: aegis-lab-cvat-worker-export
    restart: unless-stopped
    environment:
      <<: *cvat-backend-env
    volumes: *cvat-server-volumes
    command: run worker export
    depends_on:
      - cvat_server

  cvat_worker_annotation:
    <<: *cvat-server-image
    container_name: aegis-lab-cvat-worker-annotation
    restart: unless-stopped
    environment:
      <<: *cvat-backend-env
    volumes: *cvat-server-volumes
    command: run worker annotation
    depends_on:
      - cvat_server

  cvat_ui:
    image: cvat/ui:dev
    container_name: aegis-lab-cvat-ui
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.cvat-ui.loadbalancer.server.port=8000
      - traefik.http.routers.cvat-ui.rule=Host(`localhost`)||Host(`127.0.0.1`)
      - traefik.http.routers.cvat-ui.entrypoints=web
      - traefik.http.middlewares.cvat-ui-frame.headers.customResponseHeaders.X-Frame-Options=
      - traefik.http.middlewares.cvat-ui-frame.headers.customResponseHeaders.Content-Security-Policy=frame-ancestors 'self' http://127.0.0.1:8788 http://localhost:8788 http://127.0.0.1:8081 http://localhost:8081
      - traefik.http.routers.cvat-ui.middlewares=cvat-ui-frame
    depends_on:
      - cvat_server

  cvat_traefik:
    image: traefik:v3.6
    container_name: aegis-lab-cvat-traefik
    restart: unless-stopped
    environment:
      TRAEFIK_ENTRYPOINTS_web_ADDRESS: :8080
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: "false"
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: aegis-lab_default
    ports:
      - "${CVAT_PORT:-8081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - cvat_ui
      - cvat_server

volumes:
  aegis_pgdata:
  aegis_redis:
  aegis_minio_data:
  cvat_pgdata:
  cvat_inmem_db:
  cvat_cache_db:
  cvat_clickhouse:
  cvat_clickhouse_logs:
  cvat_data:
  cvat_keys:
  cvat_logs:
